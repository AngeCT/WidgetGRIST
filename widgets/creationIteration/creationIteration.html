<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nouvelle Itération</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <link rel="stylesheet" href="creationIteration.css" />
</head>
<body>

  <div id="loading">⏳ Chargement…</div>

  <div id="config-panel" hidden>
    <h3>⚙️ Configuration</h3>
    <label for="cfg-color">Couleur d'accentuation</label>
    <input type="color" id="cfg-color" value="#3ddc84" />
    <label for="cfg-table-iteration">Table Iteration</label>
    <input type="text" id="cfg-table-iteration" placeholder="Iteration" />
    <label for="cfg-table-workgroup">Table WorkGroup</label>
    <input type="text" id="cfg-table-workgroup" placeholder="WorkGroup" />
    <label for="cfg-table-software">Table Software</label>
    <input type="text" id="cfg-table-software" placeholder="Software" />
    <button id="cfg-save">💾 Enregistrer</button>
  </div>

  <div id="widget-container" hidden>
    <header>
      <h2 id="widget-title"></h2>
    </header>

    <form id="iteration-form" novalidate>

      <div class="field">
        <label for="nom">Nom <span class="required">*</span></label>
        <input type="text" id="nom" placeholder="Ex : Itération Q1 2026" />
        <span class="error-msg" id="err-nom">Ce champ est obligatoire.</span>
      </div>

      <div class="field">
        <label>WorkGroup <span class="required">*</span></label>
        <div class="combobox" id="workgroup-combo">
          <input type="text" id="workgroup-search" placeholder="Rechercher un WorkGroup…" autocomplete="off" />
          <div class="combobox-dropdown" id="workgroup-dropdown" hidden></div>
        </div>
        <input type="hidden" id="workgroup" />
        <span class="error-msg" id="err-workgroup">Veuillez sélectionner un WorkGroup.</span>
      </div>

      <div class="field">
        <label for="format">Format <span class="required">*</span></label>
        <select id="format">
          <option value="">— Sélectionner un format —</option>
        </select>
        <span class="error-msg" id="err-format">Veuillez sélectionner un format.</span>
      </div>

      <div class="field">
        <label>Début <span class="required">*</span></label>
        <div class="datetime-row">
          <input type="date" id="debut-date" />
          <input type="time" id="debut-time" value="00:00" />
        </div>
        <span class="error-msg" id="err-debut">Ce champ est obligatoire.</span>
      </div>

      <div class="field">
        <label>Fin <span class="required">*</span></label>
        <div class="datetime-row">
          <input type="date" id="fin-date" />
          <input type="time" id="fin-time" value="00:00" />
        </div>
        <span class="error-msg" id="err-fin">Ce champ est obligatoire.</span>
      </div>

      <div class="field">
        <label for="lien">Lien</label>
        <input type="url" id="lien" placeholder="https://…" />
      </div>

      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" placeholder="Description de l'itération…"></textarea>
      </div>

      <div class="field">
        <label>Softwares</label>
        <div class="multi-select" id="softwares-container">
          <span class="placeholder">⏳ Chargement…</span>
        </div>
      </div>

      <div class="form-actions">
        <button type="reset">🔄 Réinitialiser</button>
        <button type="submit" id="submit-btn">✅ Créer l'itération</button>
      </div>

    </form>

    <div id="feedback" hidden></div>
  </div>

  <span id="version-badge"></span>

  <script src="creationIteration.js" type="module"></script>
</body>
</html>
